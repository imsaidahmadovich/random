<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taso — Sign In</title>
    <meta name="description" content="Sign in or create your Taso account.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #7c3aed;
            --primary-light: #a78bfa;
            --secondary: #06b6d4;
            --bg: #05070f;
            --surface: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.09);
            --text: #f1f5f9;
            --text-muted: #64748b;
            --text-subtle: #94a3b8;
            --rose: #f43f5e;
            --emerald: #10b981;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        html,
        body {
            height: 100%
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative
        }

        #orb-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: .18;
            animation: orbF 14s ease-in-out infinite
        }

        .orb1 {
            width: 600px;
            height: 600px;
            background: #7c3aed;
            top: -150px;
            left: -150px
        }

        .orb2 {
            width: 500px;
            height: 500px;
            background: #06b6d4;
            bottom: -150px;
            right: -150px;
            animation-delay: -5s
        }

        @keyframes orbF {

            0%,
            100% {
                transform: translate(0, 0)
            }

            50% {
                transform: translate(25px, -30px)
            }
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image: linear-gradient(rgba(255, 255, 255, .015) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, .015) 1px, transparent 1px);
            background-size: 60px 60px
        }

        .auth-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 520px;
            background: rgba(255, 255, 255, .04);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 48px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, .5);
            animation: cardIn .7s cubic-bezier(.16, 1, .3, 1);
            margin: 24px;
            max-height: 90vh;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .auth-card::-webkit-scrollbar {
            display: none;
        }

        .auth-grid-split {
            display: grid;
            grid-template-columns: 100px 1fr;
            gap: 24px;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .pfp-upload-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .pfp-preview {
            width: 100px;
            height: 100px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.06);
            border: 2px dashed var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s;
            overflow: hidden;
            flex-shrink: 0;
        }

        .pfp-preview:hover {
            border-color: var(--primary);
            background: rgba(124, 58, 237, 0.05);
            color: var(--primary-light);
        }

        .pfp-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .pfp-hint {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--text-subtle);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            text-align: center;
        }

        .pfp-hint:hover {
            color: var(--primary-light);
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(.96)
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1)
            }
        }

        .auth-logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, #06b6d4);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 4px
        }

        .auth-logo span {
            -webkit-text-fill-color: #f43f5e
        }

        .auth-tagline {
            text-align: center;
            color: var(--text-muted);
            font-size: .82rem;
            margin-bottom: 28px
        }

        /* Tabs */
        .auth-tabs {
            display: flex;
            background: rgba(255, 255, 255, .04);
            border-radius: 14px;
            padding: 4px;
            margin-bottom: 28px
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 11px;
            font-size: .85rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            transition: all .25s
        }

        .auth-tab.active {
            background: var(--primary);
            color: white
        }

        /* Form */
        .auth-form {
            display: none;
            flex-direction: column;
            gap: 14px
        }

        .auth-form.active {
            display: flex
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px
        }

        .form-label {
            font-size: .72rem;
            font-weight: 700;
            color: var(--text-subtle);
            text-transform: uppercase;
            letter-spacing: .06em
        }

        .form-label .req {
            color: var(--rose)
        }

        .form-input {
            padding: 11px 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, .06);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: .88rem;
            outline: none;
            transition: all .25s
        }

        .form-input:focus {
            border-color: rgba(124, 58, 237, .5);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, .08)
        }

        .form-input::placeholder {
            color: var(--text-muted)
        }

        textarea.form-input {
            resize: vertical;
            min-height: 60px
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px
        }

        /* Updated Registration Grid Layout */
        .reg-fields {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Buttons */
        .auth-btn {
            padding: 13px;
            border-radius: 14px;
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: .92rem;
            font-weight: 700;
            cursor: pointer;
            transition: all .3s
        }

        .auth-btn-primary {
            background: linear-gradient(135deg, var(--primary), #4f46e5);
            color: white;
            box-shadow: 0 6px 20px rgba(124, 58, 237, .35)
        }

        .auth-btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 28px rgba(124, 58, 237, .5)
        }

        .auth-btn-primary:disabled {
            opacity: .5;
            pointer-events: none
        }

        .google-btn {
            width: 100%;
            padding: 13px;
            background: white;
            border: 1px solid rgba(255, 255, 255, .2);
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-family: 'Inter', sans-serif;
            font-size: .92rem;
            font-weight: 600;
            color: #1a1a2e;
            transition: all .3s
        }

        .google-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, .3)
        }

        .google-btn img {
            width: 20px;
            height: 20px
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 4px 0
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border)
        }

        .divider span {
            font-size: .72rem;
            color: var(--text-muted);
            font-weight: 500
        }

        .switch-link {
            text-align: center;
            font-size: .8rem;
            color: var(--text-muted);
            margin-top: 4px
        }

        .switch-link a {
            color: var(--primary-light);
            cursor: pointer;
            text-decoration: none;
            font-weight: 600
        }

        .switch-link a:hover {
            text-decoration: underline
        }

        .error-msg {
            background: rgba(244, 63, 94, .1);
            border: 1px solid rgba(244, 63, 94, .25);
            border-radius: 12px;
            padding: 10px 14px;
            font-size: .82rem;
            color: #fca5a5;
            text-align: center;
            display: none;
            animation: fadeIn .3s
        }

        .success-msg {
            background: rgba(16, 185, 129, .1);
            border: 1px solid rgba(16, 185, 129, .25);
            border-radius: 12px;
            padding: 10px 14px;
            font-size: .82rem;
            color: #6ee7b7;
            text-align: center;
            display: none;
            animation: fadeIn .3s
        }

        @keyframes fadeIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        .auth-footer {
            text-align: center;
            margin-top: 16px;
            font-size: .7rem;
            color: var(--text-muted)
        }

        @media(max-width:480px) {
            .auth-card {
                padding: 28px 22px;
                border-radius: 22px
            }

            .form-row {
                grid-template-columns: 1fr
            }
        }
    </style>
</head>

<body>
    <div id="orb-bg">
        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
    </div>

    <div class="auth-card">
        <div class="auth-logo">Taso<span>.</span></div>
        <div class="auth-tagline">Your premium productivity suite</div>

        <div class="auth-tabs">
            <div class="auth-tab active" onclick="switchAuthTab('login')">Sign In</div>
            <div class="auth-tab" onclick="switchAuthTab('register')">Create Account</div>
        </div>

        <div class="error-msg" id="errorMsg"></div>
        <div class="success-msg" id="successMsg"></div>

        <!-- LOGIN FORM -->
        <div class="auth-form active" id="loginForm">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" class="form-input" id="loginEmail" placeholder="you@email.com">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-input" id="loginPass" placeholder="Your password">
            </div>
            <button class="auth-btn auth-btn-primary" onclick="emailLogin()">Sign In</button>
            <div class="divider"><span>or</span></div>
            <button class="google-btn" onclick="googleLogin()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G"> Continue with
                Google
            </button>
            <div class="switch-link">Don't have an account? <a onclick="switchAuthTab('register')">Create one</a></div>
        </div>

        <!-- REGISTER FORM -->
        <div class="auth-form" id="registerForm">
            <div class="auth-grid-split">
                <!-- Left: PFP -->
                <div class="pfp-upload-box">
                    <div class="pfp-preview" id="regPfpPreview" onclick="document.getElementById('regPfpFile').click()">
                        👤</div>
                    <div class="pfp-hint" onclick="document.getElementById('regPfpFile').click()">Upload Pic</div>
                    <input type="file" id="regPfpFile" accept="image/*" style="display:none"
                        onchange="previewRegPfp(event)">
                </div>

                <!-- Right: Core Info -->
                <div class="reg-fields">
                    <div class="form-group">
                        <label class="form-label">Username <span class="req">*</span></label>
                        <input type="text" class="form-input" id="regUsername" placeholder="unique_user" maxlength="24">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Display Name</label>
                        <input type="text" class="form-input" id="regDisplayName" placeholder="Your Name">
                    </div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Email <span class="req">*</span></label>
                    <input type="email" class="form-input" id="regEmail" placeholder="you@email.com">
                </div>
                <div class="form-group">
                    <label class="form-label">Password <span class="req">*</span></label>
                    <input type="password" class="form-input" id="regPass" placeholder="Min 6 characters">
                </div>
            </div>

            <div class="form-group" style="margin-top: 4px;">
                <label class="form-label">Bio</label>
                <textarea class="form-input" id="regBio" placeholder="Tell us about yourself..."
                    maxlength="200"></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Telegram</label>
                    <input type="text" class="form-input" id="regTelegram" placeholder="@username">
                </div>
                <div class="form-group">
                    <label class="form-label">Instagram</label>
                    <input type="text" class="form-input" id="regInstagram" placeholder="@username">
                </div>
            </div>
            <button class="auth-btn auth-btn-primary" id="regBtn" onclick="emailRegister()">Create Account</button>
            <div class="divider"><span>or</span></div>
            <button class="google-btn" onclick="googleLogin()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G"> Sign up with
                Google
            </button>
            <div class="switch-link">Already have an account? <a onclick="switchAuthTab('login')">Sign in</a></div>
        </div>

        <div class="auth-footer">By continuing, you agree to our terms of service.</div>
    </div>

    <script type="module">
        import {
            auth, db, provider, signInWithPopup, onAuthStateChanged,
            createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile,
            doc, getDoc, setDoc
        } from "./auth.js";

        // Redirect if already logged in
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // Check profile exists
                const snap = await getDoc(doc(db, 'profiles', user.uid));
                if (snap.exists() && snap.data().username) {
                    window.location.href = "dashboard.html";
                } else {
                    // Show register form for Google users who haven't set up profile
                    switchAuthTab('register');
                    document.getElementById('regEmail').value = user.email || '';
                    document.getElementById('regDisplayName').value = user.displayName || '';
                    if (user.photoURL) {
                        document.getElementById('regPfpPreview').innerHTML = `<img src="${user.photoURL}">`;
                        regPfpBase64 = user.photoURL;
                    }
                    showSuccess('Welcome! Please complete your profile to continue.');
                }
            }
        });

        // Tab switching
        window.switchAuthTab = function (tab) {
            document.querySelectorAll('.auth-tab').forEach((t, i) => t.classList.toggle('active', i === (tab === 'login' ? 0 : 1)));
            document.getElementById('loginForm').classList.toggle('active', tab === 'login');
            document.getElementById('registerForm').classList.toggle('active', tab === 'register');
            hideMessages();
        };

        // Email Login
        window.emailLogin = async function () {
            hideMessages();
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPass').value;
            if (!email || !pass) { showError('Please enter email and password.'); return; }
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                window.location.href = "dashboard.html";
            } catch (e) {
                if (e.code === 'auth/user-not-found' || e.code === 'auth/invalid-credential') showError('Invalid email or password.');
                else if (e.code === 'auth/too-many-requests') showError('Too many attempts. Try again later.');
                else showError('Login failed: ' + e.message);
            }
        };

        // Google Login
        window.googleLogin = async function () {
            hideMessages();
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                const snap = await getDoc(doc(db, 'profiles', user.uid));
                if (snap.exists() && snap.data().username) {
                    window.location.href = "dashboard.html";
                }
                // If no profile, onAuthStateChanged will handle showing register form
            } catch (e) {
                if (e.code !== 'auth/popup-closed-by-user') showError('Sign-in failed: ' + e.message);
            }
        };

        // Email Register
        window.emailRegister = async function () {
            hideMessages();
            const email = document.getElementById('regEmail').value.trim();
            const pass = document.getElementById('regPass').value;
            const username = document.getElementById('regUsername').value.trim();
            const displayName = document.getElementById('regDisplayName').value.trim();

            if (!email || !pass) { showError('Email and password are required.'); return; }
            if (!username) { showError('Username is required.'); return; }
            if (pass.length < 6) { showError('Password must be at least 6 characters.'); return; }
            if (!/^[a-zA-Z0-9_]+$/.test(username)) { showError('Username: letters, numbers, underscore only.'); return; }

            const btn = document.getElementById('regBtn');
            btn.disabled = true; btn.textContent = '⏳ Creating...';

            try {
                let user = auth.currentUser;
                if (!user) {
                    const cred = await createUserWithEmailAndPassword(auth, email, pass);
                    user = cred.user;
                }
                if (displayName) await updateProfile(user, { displayName });

                // Save profile to Firestore
                await setDoc(doc(db, 'profiles', user.uid), {
                    email: user.email || email,
                    username,
                    displayName: displayName || username,
                    bio: document.getElementById('regBio').value.trim(),
                    telegram: document.getElementById('regTelegram').value.trim(),
                    instagram: document.getElementById('regInstagram').value.trim(),
                    photoURL: regPfpBase64 || '',
                    anonymous: false,
                    createdAt: new Date().toISOString()
                }, { merge: true });

                window.location.href = "dashboard.html";
            } catch (e) {
                if (e.code === 'auth/email-already-in-use') showError('This email is already registered. Try signing in.');
                else if (e.code === 'auth/weak-password') showError('Password is too weak. Use at least 6 characters.');
                else showError('Registration failed: ' + e.message);
                btn.disabled = false; btn.textContent = 'Create Account';
            }
        };

        // Profile pic preview
        window.previewRegPfp = function (e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (ev) {
                // Resize image to 128x128
                const img = new Image();
                img.onload = function () {
                    const canvas = document.createElement('canvas');
                    canvas.width = 128; canvas.height = 128;
                    const ctx = canvas.getContext('2d');
                    const min = Math.min(img.width, img.height);
                    const sx = (img.width - min) / 2, sy = (img.height - min) / 2;
                    ctx.drawImage(img, sx, sy, min, min, 0, 0, 128, 128);
                    regPfpBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById('regPfpPreview').innerHTML = `<img src="${regPfpBase64}">`;
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        };

        function showError(msg) { const el = document.getElementById('errorMsg'); el.textContent = msg; el.style.display = 'block'; document.getElementById('successMsg').style.display = 'none'; }
        function showSuccess(msg) { const el = document.getElementById('successMsg'); el.textContent = msg; el.style.display = 'block'; document.getElementById('errorMsg').style.display = 'none'; }
        function hideMessages() { document.getElementById('errorMsg').style.display = 'none'; document.getElementById('successMsg').style.display = 'none'; }
    </script>
</body>

</html>
