<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Spin The Wheel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --primary: #7c3aed;
      --primary-dark: #6d28d9;
      --accent: #f43f5e;
      --bg: #05070f;
      --surface: rgba(255, 255, 255, 0.04);
      --surface2: rgba(255, 255, 255, 0.08);
      --text: #f1f5f9;
      --text-muted: #64748b;
      --border: rgba(255, 255, 255, 0.1);
      --danger: #ef4444;
      --success: #22c55e;
      --radius: 20px;
    }

    body[data-theme="light"] {
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface2: #f1f5f9;
      --text: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
    }

    * {
      box-sizing: border-box;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: background-color 0.4s, color 0.4s;
    }

    /* Iframe / Compact Mode */
    body.in-iframe {
      padding: 0;
      min-height: 100vh;
      overflow: hidden;
      background: transparent;
    }

    body.in-iframe .back-link {
      display: none !important;
    }

    body.in-iframe .app-container {
      max-width: 100%;
      width: 100%;
      height: 100vh;
      min-height: 0;
      border-radius: 0;
      box-shadow: none;
      border: none;
      background: var(--bg);
    }

    body.in-iframe .app-main {
      padding: 10px;
    }

    .app-container {
      width: 100%;
      max-width: 1000px;
      background: var(--surface);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 600px;
      position: relative;
    }

    .header-tabs {
      display: flex;
      padding: 6px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 12px;
      cursor: pointer;
      font-weight: 600;
      color: var(--text-muted);
      border-radius: 14px;
      transition: all 0.2s;
      font-size: 14px;
    }

    .tab.active {
      background: var(--primary);
      color: white;
    }

    .app-main {
      flex: 1;
      padding: 30px;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .view {
      display: none;
      flex-direction: column;
      animation: viewFade 0.4s ease;
      height: 100%;
    }

    .view.active {
      display: flex;
    }

    @keyframes viewFade {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Setup View */
    .setup-header {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .st-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
    }

    .st-input:focus {
      border-color: var(--primary);
    }

    .btn-add {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 0 20px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-add:hover {
      transform: translateY(-1px);
      filter: brightness(1.1);
    }

    .list-container {
      flex: 1;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(0, 0, 0, 0.1);
      padding: 5px;
    }

    .item-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--surface2);
      border-radius: 12px;
      margin-bottom: 5px;
      border: 1px solid transparent;
    }

    .item-card:hover {
      border-color: var(--border);
    }

    .item-name {
      font-weight: 600;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .item-weight {
      font-size: 11px;
      opacity: 0.5;
      font-weight: 400;
      margin-left: 5px;
    }

    .btn-del {
      background: transparent;
      color: var(--rose);
      border: none;
      cursor: pointer;
      opacity: 0.5;
      transition: opacity 0.2s;
      font-size: 18px;
    }

    .btn-del:hover {
      opacity: 1;
    }

    /* Wheel View */
    .wheel-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .wheel-wrapper {
      position: relative;
      width: min(480px, 80vw);
      height: min(480px, 80vw);
      margin: 10px auto;
    }

    body.in-iframe .wheel-wrapper {
      width: min(340px, 70vh);
      height: min(340px, 70vh);
    }

    #wheelCanvas {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 20px rgba(0, 0, 0, 0.3));
    }

    .pointer {
      position: absolute;
      top: -15px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 50px;
      background: var(--accent);
      clip-path: polygon(50% 100%, 0 0, 100% 0);
      z-index: 10;
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.3));
    }

    .spin-btn {
      margin-top: 20px;
      background: linear-gradient(135deg, var(--primary), #4f46e5);
      color: white;
      border: none;
      padding: 15px 50px;
      border-radius: 50px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 10px 20px rgba(124, 58, 237, 0.3);
    }

    .spin-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 30px rgba(124, 58, 237, 0.4);
    }

    .spin-btn:disabled {
      opacity: 0.5;
      transform: none;
      box-shadow: none;
      cursor: not-allowed;
    }

    /* Modal */
    .modal-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(5px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
      animation: modalScale 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes modalScale {
      from {
        transform: scale(0.8);
        opacity: 0;
      }
    }

    .modal-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-muted);
      margin-bottom: 10px;
      font-weight: 700;
    }

    .winner-name {
      font-size: 36px;
      font-weight: 800;
      margin-bottom: 30px;
      background: linear-gradient(135deg, #fff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .modal-btns {
      display: flex;
      gap: 10px;
    }

    .m-btn {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      border: none;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .m-btn-sec {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .m-btn-pri {
      background: var(--primary);
      color: white;
    }

    /* Confetti */
    #confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 200;
    }

    .back-link {
      position: absolute;
      top: 20px;
      left: 20px;
      text-decoration: none;
      color: var(--text-muted);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 1000;
      background: var(--surface);
      padding: 8px 16px;
      border-radius: 30px;
      border: 1px solid var(--border);
    }

    body.in-iframe .back-link {
      display: none !important;
    }
  </style>
</head>

<body>
  <canvas id="confetti"></canvas>

  <a href="index.html" class="back-link">← Back to Taso</a>

  <div class="app-container">
    <div class="header-tabs">
      <div class="tab active" data-tab="setup" onclick="switchTab('setup')">Setup List</div>
      <div class="tab" data-tab="wheel" onclick="switchTab('wheel')">Spin Wheel</div>
    </div>

    <div class="app-main">
      <!-- SETUP VIEW -->
      <div class="view active" id="view-setup">
        <div class="setup-header">
          <input type="text" class="st-input" id="itemIn" placeholder="Enter choice..."
            onkeypress="if(event.key==='Enter')addItem()">
          <input type="number" class="st-input" id="weightIn" value="1" min="1" style="width: 70px;">
          <button class="btn-add" onclick="addItem()">Add</button>
        </div>
        <div class="list-container" id="listCont"></div>
        <div style="margin-top: 15px; text-align: right;">
          <button onclick="if(confirm('Clear all?')){items=[];save();render();}"
            style="background:transparent;border:none;color:var(--rose);cursor:pointer;font-size:12px;font-weight:700;">RESET
            ALL</button>
        </div>
      </div>

      <!-- WHEEL VIEW -->
      <div class="view" id="view-wheel">
        <div class="wheel-container">
          <div class="wheel-wrapper">
            <div class="pointer"></div>
            <canvas id="wheelCanvas" width="800" height="800"></canvas>
          </div>
          <button class="spin-btn" id="spinBtn" onclick="spin()">SPIN WHEEL</button>
          <button onclick="switchTab('setup')"
            style="background:transparent;border:none;color:var(--text-muted);margin-top:20px;cursor:pointer;font-size:13px;">Edit
            choices</button>
        </div>
      </div>

      <!-- MODAL -->
      <div class="modal-overlay" id="modal">
        <div class="modal">
          <div class="modal-title">The Winner is</div>
          <div class="winner-name" id="winnerName">Choice Name</div>
          <div class="modal-btns">
            <button class="m-btn m-btn-sec" onclick="closeModal()">Keep Item</button>
            <button class="m-btn m-btn-pri" onclick="removeAndClose()">Remove & Close</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const COLORS = ["#7c3aed", "#3b82f6", "#10b981", "#f59e0b", "#f43f5e", "#8b5cf6", "#ec4899", "#06b6d4", "#14b8a6"];
    let items = [];
    let isSpinning = false;
    let rotation = 0;
    let winnerIdx = -1;

    // Theme Sync
    window.addEventListener('message', e => {
      if (e.data.type === 'taso-theme') document.body.setAttribute('data-theme', e.data.theme);
    });
    // Check local initial theme
    const savedTheme = localStorage.getItem('taso-theme');
    if (savedTheme) document.body.setAttribute('data-theme', savedTheme);

    if (window.self !== window.top) document.body.classList.add('in-iframe');

    window.onload = () => {
      const saved = sessionStorage.getItem('taso-wheel-items');
      if (saved) items = JSON.parse(saved);
      render();
      draw();
    };

    function save() { sessionStorage.setItem('taso-wheel-items', JSON.stringify(items)); }

    function switchTab(t) {
      document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.dataset.tab === t));
      document.querySelectorAll('.view').forEach(el => el.classList.toggle('active', el.id === `view-${t}`));
      if (t === 'wheel') draw();
    }

    function addItem() {
      const name = document.getElementById('itemIn').value.trim();
      const weight = parseInt(document.getElementById('weightIn').value) || 1;
      if (!name) return;
      items.push({ id: Date.now(), name, weight });
      document.getElementById('itemIn').value = '';
      document.getElementById('itemIn').focus();
      save(); render();
    }

    function render() {
      const cont = document.getElementById('listCont');
      if (items.length === 0) { cont.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);font-size:14px;">Add choices to spin the wheel!</div>'; return; }
      cont.innerHTML = items.map((it, i) => `
        <div class="item-card">
          <div class="item-name"><div class="dot" style="background:${COLORS[i % COLORS.length]}"></div>${it.name}<span class="item-weight">${it.weight > 1 ? `(${it.weight}x)` : ''}</span></div>
          <button class="btn-del" onclick="items=items.filter(x=>x.id!==${it.id});save();render();">✕</button>
        </div>
      `).join('');
    }

    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');

    function draw() {
      const size = 800;
      const center = size / 2;
      const radius = size / 2 - 10;
      ctx.clearRect(0, 0, size, size);

      if (items.length === 0) {
        ctx.fillStyle = "#64748b"; ctx.font = "bold 30px Outfit"; ctx.textAlign = "center";
        ctx.fillText("Empty Wheel", center, center); return;
      }

      const totalWeight = items.reduce((a, b) => a + b.weight, 0);
      let cumulativeArc = 0;

      items.forEach((it, i) => {
        const itemArc = (it.weight / totalWeight) * (2 * Math.PI);
        const start = cumulativeArc + rotation;
        const end = start + itemArc;

        ctx.beginPath();
        ctx.moveTo(center, center);
        ctx.arc(center, center, radius, start, end);
        ctx.fillStyle = COLORS[i % COLORS.length];
        ctx.fill();

        // Text
        ctx.save();
        ctx.translate(center, center);
        ctx.rotate(start + itemArc / 2);
        ctx.textAlign = "right";
        ctx.fillStyle = "white";
        ctx.font = "bold 28px Outfit";
        ctx.fillText(it.name.length > 15 ? it.name.substring(0, 12) + "..." : it.name, radius - 40, 10);
        ctx.restore();

        cumulativeArc += itemArc;
      });

      // Hub
      ctx.beginPath(); ctx.arc(center, center, 40, 0, 2 * Math.PI);
      ctx.fillStyle = "#0a0e1a"; ctx.strokeStyle = "white"; ctx.lineWidth = 4;
      ctx.fill(); ctx.stroke();
    }

    function spin() {
      if (isSpinning || items.length === 0) return;
      isSpinning = true;
      document.getElementById('spinBtn').disabled = true;

      const totalWeight = items.reduce((a, b) => a + b.weight, 0);
      let rand = Math.random() * totalWeight;
      let winIdx = 0;
      let cumulativeWeight = 0;

      for (let i = 0; i < items.length; i++) {
        if (rand < cumulativeWeight + items[i].weight) {
          winIdx = i;
          break;
        }
        cumulativeWeight += items[i].weight;
      }
      winnerIdx = winIdx;

      // Calculate target angle based on weighted arcs
      let targetCumulativeArc = 0;
      for (let i = 0; i < winIdx; i++) {
        targetCumulativeArc += (items[i].weight / totalWeight) * (2 * Math.PI);
      }
      const winnerArc = (items[winIdx].weight / totalWeight) * (2 * Math.PI);

      // The pointer is at 1.5 * Math.PI (top). To land the center of winnerArc at top:
      // (rotation + targetCumulativeArc + winnerArc/2) % 2PI should be 1.5 * PI
      // But let's simplify: targetAngle is where the slice center should be relative to rotation 0.
      const targetAngle = 1.5 * Math.PI - (targetCumulativeArc + winnerArc / 2);

      const spins = 5 + Math.random() * 5;
      const finalRotation = rotation + (spins * 2 * Math.PI) + (targetAngle - (rotation % (2 * Math.PI)));

      const start = performance.now();
      const dur = 5000;
      const startRot = rotation;

      function animate(now) {
        let elapsed = now - start;
        let p = Math.min(1, elapsed / dur);
        let ease = 1 - Math.pow(1 - p, 4); // Quartic ease-out
        rotation = startRot + (finalRotation - startRot) * ease;
        draw();
        if (p < 1) requestAnimationFrame(animate);
        else finishSpin();
      }
      requestAnimationFrame(animate);
    }

    function finishSpin() {
      isSpinning = false;
      document.getElementById('spinBtn').disabled = false;
      document.getElementById('winnerName').textContent = items[winnerIdx].name;
      document.getElementById('modal').classList.add('active');
      fireConfetti();
    }

    function closeModal() { document.getElementById('modal').classList.remove('active'); }
    function removeAndClose() {
      items.splice(winnerIdx, 1);
      save(); render(); closeModal();
    }

    // CONFETTI
    const confCanvas = document.getElementById('confetti');
    const cctx = confCanvas.getContext('2d');
    let conf = [];
    function fireConfetti() {
      confCanvas.width = window.innerWidth; confCanvas.height = window.innerHeight;
      for (let i = 0; i < 100; i++) {
        conf.push({ x: window.innerWidth / 2, y: window.innerHeight / 2, vx: (Math.random() - 0.5) * 15, vy: (Math.random() - 1) * 15, s: Math.random() * 8 + 4, c: COLORS[Math.floor(Math.random() * COLORS.length)], l: 1 });
      }
      if (conf.length === 100) reqConf();
    }
    function reqConf() {
      cctx.clearRect(0, 0, confCanvas.width, confCanvas.height);
      for (let i = conf.length - 1; i >= 0; i--) {
        let p = conf[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.3; p.l -= 0.01;
        if (p.l <= 0) { conf.splice(i, 1); continue; }
        cctx.fillStyle = p.c; cctx.globalAlpha = p.l;
        cctx.fillRect(p.x, p.y, p.s, p.s);
      }
      if (conf.length > 0) requestAnimationFrame(reqConf);
    }
  </script>
</body>

</html>
