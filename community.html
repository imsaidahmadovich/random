<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taso — Community</title>
    <meta name="description" content="Join the Taso community. Real-time chat, ideas, and collaboration.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #7c3aed;
            --primary-light: #a78bfa;
            --secondary: #06b6d4;
            --bg: #05070f;
            --surface: rgba(255, 255, 255, 0.04);
            --surface2: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text: #f1f5f9;
            --text-muted: #64748b;
            --text-subtle: #94a3b8;
            --nav-h: 68px;
            --rose: #f43f5e;
            --emerald: #10b981;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        #orb-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(130px);
            opacity: 0.12;
        }

        .orb1 {
            width: 600px;
            height: 600px;
            background: #f43f5e;
            top: -200px;
            right: -100px;
        }

        .orb2 {
            width: 400px;
            height: 400px;
            background: #7c3aed;
            bottom: -100px;
            left: -100px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image: linear-gradient(rgba(255, 255, 255, 0.012) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.012) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            height: var(--nav-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            background: rgba(5, 7, 15, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .nav-logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, #06b6d4);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .nav-logo span {
            -webkit-text-fill-color: #f43f5e;
        }

        .nav-tabs {
            display: flex;
            gap: 4px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 6px;
        }

        .nav-tab {
            padding: 8px 22px;
            border-radius: 10px;
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--text-subtle);
            text-decoration: none;
            transition: all 0.25s;
        }

        .nav-tab:hover {
            color: var(--text);
            background: var(--surface);
        }

        .nav-tab.active {
            background: linear-gradient(135deg, #f43f5e, #e11d48);
            color: white;
            box-shadow: 0 4px 20px rgba(244, 63, 94, 0.4);
        }

        .nav-tab.tools-tab {
            background: linear-gradient(135deg, var(--primary), #4f46e5);
            color: white;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 6px 16px 6px 8px;
            font-size: 0.82rem;
            color: var(--text-subtle);
        }

        .user-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f43f5e, #e11d48);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
            color: white;
        }

        .logout-btn {
            padding: 8px 18px;
            border-radius: 10px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-subtle);
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            font-family: inherit;
        }

        .logout-btn:hover {
            border-color: var(--rose);
            color: var(--rose);
        }

        /* LAYOUT */
        .community-layout {
            display: flex;
            position: fixed;
            top: var(--nav-h);
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 10;
        }

        /* SIDEBAR */
        .comm-sidebar {
            width: 260px;
            flex-shrink: 0;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.02);
        }

        .comm-sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .comm-sidebar-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.68rem;
            font-weight: 700;
            color: var(--emerald);
        }

        .live-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--emerald);
            animation: pulseLive 1.4s ease-in-out infinite;
        }

        @keyframes pulseLive {

            0%,
            100% {
                opacity: 1;
                transform: scale(1)
            }

            50% {
                opacity: 0.4;
                transform: scale(0.8)
            }
        }

        .channel-list {
            padding: 12px;
            flex: 1;
            overflow-y: auto;
        }

        .channel-label {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-muted);
            padding: 8px 8px 6px;
        }

        .channel {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.88rem;
            font-weight: 500;
            color: var(--text-subtle);
        }

        .channel:hover {
            background: var(--surface);
            color: var(--text);
        }

        .channel.active {
            background: rgba(244, 63, 94, 0.12);
            color: #fca5a5;
        }

        .channel-icon {
            font-size: 0.85rem;
            width: 20px;
            text-align: center;
        }

        .channel-unread {
            margin-left: auto;
            background: var(--rose);
            color: white;
            font-size: 0.6rem;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 8px;
        }

        .online-list {
            padding: 12px;
            border-top: 1px solid var(--border);
        }

        .online-title {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-muted);
            padding: 0 4px 10px;
        }

        .online-user {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 4px;
            font-size: 0.82rem;
            color: var(--text-subtle);
        }

        .online-av {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.62rem;
            font-weight: 700;
            color: white;
            position: relative;
            flex-shrink: 0;
        }

        .online-av::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--emerald);
            border: 1px solid var(--bg);
        }

        /* CHAT */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.01);
            flex-shrink: 0;
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-channel-name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
        }

        .chat-channel-desc {
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        .chat-header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-btn {
            padding: 7px 16px;
            border-radius: 9px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-subtle);
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .header-btn:hover {
            background: var(--surface-hover);
            color: var(--text);
        }

        .admin-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.05) transparent;
        }

        .messages::-webkit-scrollbar {
            width: 4px;
        }

        .messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 2px;
        }

        /* MESSAGE */
        .msg-group {
            display: flex;
            gap: 12px;
            margin-top: 12px;
            animation: msgIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes msgIn {
            from {
                opacity: 0;
                transform: translateY(8px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .msg-group+.msg-group {
            margin-top: 12px;
        }

        .msg-group.consecutive {
            margin-top: 2px;
        }

        .msg-avatar {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            color: white;
            align-self: flex-start;
        }

        .msg-group.consecutive .msg-avatar {
            opacity: 0;
        }

        .msg-content {
            flex: 1;
            min-width: 0;
        }

        .msg-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 4px;
        }

        .msg-author {
            font-size: 0.82rem;
            font-weight: 700;
        }

        .msg-time {
            font-size: 0.68rem;
            color: var(--text-muted);
        }

        .msg-text {
            font-size: 0.9rem;
            line-height: 1.55;
            color: var(--text);
            word-break: break-word;
            max-width: 680px;
            padding: 8px 14px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 0 14px 14px 14px;
            border: 1px solid var(--border);
            display: inline-block;
        }

        .msg-group.me {
            flex-direction: row-reverse;
        }

        .msg-group.me .msg-content {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .msg-group.me .msg-meta {
            flex-direction: row-reverse;
        }

        .msg-group.me .msg-text {
            background: linear-gradient(135deg, rgba(244, 63, 94, 0.2), rgba(190, 18, 60, 0.15));
            border-color: rgba(244, 63, 94, 0.2);
            border-radius: 14px 0 14px 14px;
        }

        .msg-actions {
            display: none;
            align-items: center;
            gap: 4px;
        }

        .msg-content:hover .msg-actions {
            display: flex;
        }

        .msg-action-btn {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-muted);
            font-size: 0.7rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .msg-action-btn:hover {
            background: rgba(244, 63, 94, 0.1);
            color: var(--rose);
        }

        .loading-msgs {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--text-muted);
            padding: 40px;
            font-size: 0.85rem;
        }

        .loader-dots {
            display: flex;
            gap: 5px;
        }

        .loader-dots span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--primary-light);
            animation: dotAnim 1.2s ease-in-out infinite;
        }

        .loader-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loader-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes dotAnim {

            0%,
            80%,
            100% {
                transform: scale(0.8);
                opacity: 0.5
            }

            40% {
                transform: scale(1.1);
                opacity: 1
            }
        }

        /* DATE DIVIDER */
        .date-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
        }

        .date-divider::before,
        .date-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .date-divider span {
            font-size: 0.68rem;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.04em;
        }

        /* INPUT */
        .input-area {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.01);
            flex-shrink: 0;
        }

        .input-wrap {
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 8px 12px 8px 18px;
            align-items: flex-end;
            transition: all 0.3s;
        }

        .input-wrap:focus-within {
            border-color: rgba(244, 63, 94, 0.35);
            box-shadow: 0 0 0 3px rgba(244, 63, 94, 0.06);
        }

        .msg-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            outline: none;
            resize: none;
            max-height: 120px;
            line-height: 1.5;
            padding: 6px 0;
            scrollbar-width: none;
        }

        .msg-input::placeholder {
            color: var(--text-muted);
        }

        .input-actions {
            display: flex;
            gap: 6px;
            align-items: center;
            padding-bottom: 4px;
        }

        .send-btn {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            background: linear-gradient(135deg, #f43f5e, #e11d48);
            border: none;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s;
        }

        .send-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 4px 16px rgba(244, 63, 94, 0.4);
        }

        .send-btn:disabled {
            opacity: 0.4;
            transform: none;
        }

        @media(max-width:768px) {
            nav {
                padding: 0 16px
            }

            .nav-tabs {
                display: none
            }

            .comm-sidebar {
                display: none
            }
        }

        @media(max-width:480px) {
            .user-badge {
                display: none
            }
        }
    </style>
    <script type="module">
        import { auth, onAuthStateChanged, logout } from "./auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, deleteDoc, doc, getDoc, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        window.handleLogout = logout;

        const db = getFirestore();
        const messagesCol = collection(db, "messages");
        let currentUser = null;
        let isAdminMode = false;
        let lastMessages = [];
        let lastRenderCount = 0;

        onAuthStateChanged(auth, (user) => {
            if (!user) { window.location.href = "login.html"; return; }
            currentUser = user;
            const av = document.getElementById('user-av');
            const un = document.getElementById('user-name');
            if (av) av.textContent = (user.displayName || user.email || 'U')[0].toUpperCase();
            if (un) un.textContent = user.displayName || user.email;
            initChat();
        });

        document.getElementById('adminCheckbox').addEventListener('change', async (e) => {
            if (e.target.checked) {
                const pass = prompt("Enter Admin Password:");
                try {
                    const adminDoc = await getDoc(doc(db, "settings", "admin"));
                    if (!adminDoc.exists() || pass !== adminDoc.data().password) {
                        alert("Access denied."); e.target.checked = false; isAdminMode = false; return;
                    }
                    isAdminMode = true;
                } catch { alert("Error."); e.target.checked = false; isAdminMode = false; return; }
            } else { isAdminMode = false; }
            renderMessages(lastMessages, true);
        });

        function initChat() {
            const q = query(messagesCol, orderBy("createdAt", "asc"), limit(200));
            onSnapshot(q, (snapshot) => {
                lastMessages = [];
                snapshot.forEach(d => lastMessages.push({ id: d.id, ...d.data() }));
                renderMessages(lastMessages, false);
            });
        }

        function renderMessages(msgs, forceAll) {
            const box = document.getElementById('messages');
            if (msgs.length === 0) {
                box.innerHTML = '<div class="loading-msgs" style="color:rgba(255,255,255,0.15);font-size:0.85rem;">No messages yet. Be the first to say something! 👋</div>';
                lastRenderCount = 0; return;
            }
            if (!forceAll && lastRenderCount === msgs.length) return;

            box.innerHTML = '';
            let lastDate = '';
            let lastSender = '';

            msgs.forEach((msg, i) => {
                const ts = msg.createdAt?.toDate?.() || new Date();
                const dayStr = ts.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
                if (dayStr !== lastDate) {
                    const div = document.createElement('div');
                    div.className = 'date-divider';
                    div.innerHTML = `<span>${dayStr}</span>`;
                    box.appendChild(div);
                    lastDate = dayStr; lastSender = '';
                }

                const isMe = msg.senderEmail === currentUser?.email;
                const consecutive = lastSender === msg.senderId && !isMe;
                lastSender = msg.senderId;

                const group = document.createElement('div');
                group.className = `msg-group ${isMe ? 'me' : ''} ${consecutive ? 'consecutive' : ''}`;

                const colors = ['#7c3aed', '#f43f5e', '#10b981', '#06b6d4', '#f59e0b', '#8b5cf6'];
                const colorIdx = (msg.senderId || '').split('').reduce((a, c) => a + c.charCodeAt(0), 0) % colors.length;
                const avatarColor = colors[colorIdx];
                const initial = (msg.senderName || msg.senderEmail || '?')[0].toUpperCase();

                const timeStr = ts.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
                const displayName = isMe ? 'You' : (isAdminMode ? (msg.senderName || 'Guest') : 'Member');

                const delBtn = (isAdminMode || isMe) ?
                    `<button class="msg-action-btn" onclick="deleteMsg('${msg.id}')" title="Delete">🗑</button>` : '';

                group.innerHTML = `
                    <div class="msg-avatar" style="background:linear-gradient(135deg,${avatarColor},${avatarColor}99)">${initial}</div>
                    <div class="msg-content">
                        ${!consecutive ? `<div class="msg-meta">
                            <span class="msg-author" style="color:${avatarColor}">${displayName}</span>
                            <span class="msg-time">${timeStr}</span>
                            <div class="msg-actions">${delBtn}</div>
                        </div>` : `<div class="msg-actions" style="margin-bottom:4px">${delBtn}</div>`}
                        <span class="msg-text">${escHtml(msg.text)}</span>
                    </div>`;
                box.appendChild(group);
            });

            lastRenderCount = msgs.length;
            box.scrollTop = box.scrollHeight;
        }

        function escHtml(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        window.deleteMsg = async function (id) {
            if (confirm('Delete this message?')) {
                try { await deleteDoc(doc(db, "messages", id)); } catch (e) { console.error(e); }
            }
        };

        window.sendMessage = async function () {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text || !currentUser) return;
            input.value = ''; adjustTextarea();
            try {
                await addDoc(messagesCol, {
                    text, senderId: currentUser.uid,
                    senderName: currentUser.displayName,
                    senderEmail: currentUser.email,
                    createdAt: serverTimestamp()
                });
            } catch (e) { input.value = text; }
        };

        document.getElementById('msgInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });
        document.getElementById('msgInput').addEventListener('input', adjustTextarea);
        function adjustTextarea() {
            const ta = document.getElementById('msgInput');
            ta.style.height = 'auto';
            ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
        }
    </script>
</head>

<body>
    <div id="orb-bg">
        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
    </div>

    <nav>
        <a href="index.html" class="nav-logo">Taso<span>.</span></a>
        <div class="nav-tabs">
            <a href="index.html" class="nav-tab">🏠 Home</a>
            <a href="tools.html" class="nav-tab tools-tab">⚡ Tools</a>
            <a href="community.html" class="nav-tab active">🔥 Community</a>
        </div>
        <div class="nav-right">
            <div class="user-badge">
                <div class="user-avatar" id="user-av">U</div><span id="user-name">Loading…</span>
            </div>
            <button class="logout-btn" onclick="handleLogout()">Sign Out</button>
        </div>
    </nav>

    <div class="community-layout">
        <!-- SIDEBAR -->
        <div class="comm-sidebar">
            <div class="comm-sidebar-header">
                <div class="comm-sidebar-title">🔥 Community</div>
                <div class="live-badge"><span class="live-dot"></span> Live Chat</div>
            </div>
            <div class="channel-list">
                <div class="channel-label">Channels</div>
                <div class="channel active"><span class="channel-icon">#</span> general</div>
                <div class="channel"><span class="channel-icon">#</span> tools-help</div>
                <div class="channel"><span class="channel-icon">#</span> off-topic</div>
                <div class="channel"><span class="channel-icon">📢</span> announcements</div>
                <div class="channel"><span class="channel-icon">💡</span> ideas</div>
            </div>
            <div class="online-list">
                <div class="online-title">Online — 1</div>
                <div class="online-user" id="sidebarUser">
                    <div class="online-av" id="sidebarAv">U</div>
                    <span id="sidebarName">You</span>
                </div>
            </div>
        </div>

        <!-- CHAT -->
        <div class="chat-area">
            <div class="chat-header">
                <div class="chat-header-left">
                    <div>
                        <div class="chat-channel-name"># general</div>
                        <div class="chat-channel-desc">The main community space for everyone</div>
                    </div>
                </div>
                <div class="chat-header-right">
                    <label class="admin-toggle header-btn" style="cursor:pointer;">
                        <input type="checkbox" id="adminCheckbox" style="accent-color:#f43f5e;"> Admin
                    </label>
                </div>
            </div>

            <div class="messages" id="messages">
                <div class="loading-msgs">
                    <div class="loader-dots"><span></span><span></span><span></span></div>
                    Connecting…
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrap">
                    <textarea class="msg-input" id="msgInput" placeholder="Message #general…" rows="1"></textarea>
                    <div class="input-actions">
                        <button class="send-btn" onclick="sendMessage()" title="Send (Enter)">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="22" y1="2" x2="11" y2="13" />
                                <polygon points="22 2 15 22 11 13 2 9 22 2" />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Update sidebar with current user info
        document.addEventListener('DOMContentLoaded', () => {
            // Will be updated by firebase auth listener above
        });
        window.addEventListener('userLoaded', (e) => {
            const u = e.detail;
            document.getElementById('sidebarAv').textContent = (u.displayName || u.email || 'U')[0].toUpperCase();
            document.getElementById('sidebarName').textContent = u.displayName || u.email || 'You';
        });
    </script>
</body>

</html>
