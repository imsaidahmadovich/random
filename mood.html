<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taso — Mood Journal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #05070f;
            --surface: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.08);
            --text: #f1f5f9;
            --muted: #64748b;
            --subtle: #94a3b8;
            --nav-h: 68px;
            --rose: #f43f5e;
            --green: #10b981;
            --amber: #f59e0b;
            --purple: #7c3aed;
            --cyan: #06b6d4
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh
        }

        #orb-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: .1
        }

        .orb1 {
            width: 500px;
            height: 500px;
            background: #f43f5e;
            top: -150px;
            left: 30%
        }

        .orb2 {
            width: 300px;
            height: 300px;
            background: #7c3aed;
            bottom: -60px;
            right: -60px
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image: linear-gradient(rgba(255, 255, 255, .012) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, .012) 1px, transparent 1px);
            background-size: 60px 60px
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            height: var(--nav-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            background: rgba(5, 7, 15, .88);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border)
        }

        .nav-logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, #06b6d4);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none
        }

        .nav-logo span {
            -webkit-text-fill-color: #f43f5e
        }

        .nav-tabs {
            display: flex;
            gap: 4px;
            background: rgba(255, 255, 255, .04);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 6px
        }

        .nav-tab {
            padding: 8px 22px;
            border-radius: 10px;
            font-size: .88rem;
            font-weight: 600;
            color: var(--subtle);
            text-decoration: none;
            transition: all .25s
        }

        .nav-tab.act {
            background: linear-gradient(135deg, var(--purple), #4f46e5);
            color: #fff
        }

        .nav-tab.com {
            background: linear-gradient(135deg, var(--rose), #e11d48);
            color: #fff
        }

        .back-link {
            font-size: .82rem;
            font-weight: 600;
            color: var(--subtle);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
            transition: all .25s
        }

        .back-link:hover {
            color: var(--text)
        }

        main {
            position: relative;
            z-index: 10;
            max-width: 820px;
            margin: 0 auto;
            padding: calc(var(--nav-h)+40px) 24px 80px
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 6px
        }

        .sub {
            color: var(--muted);
            font-size: .9rem;
            margin-bottom: 32px
        }

        /* MOOD PICKER */
        .mood-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 28px;
            margin-bottom: 20px;
            animation: fIn .4s ease-out
        }

        @keyframes fIn {
            from {
                opacity: 0;
                transform: translateY(14px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .card-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: .95rem;
            font-weight: 700;
            color: var(--subtle);
            margin-bottom: 18px
        }

        .mood-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px
        }

        .mood-btn {
            width: 72px;
            height: 72px;
            border-radius: 20px;
            border: 2px solid var(--border);
            background: transparent;
            font-size: 2rem;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            transition: all .3s;
            position: relative
        }

        .mood-btn .mood-lbl {
            font-size: .58rem;
            font-weight: 700;
            color: var(--muted);
            letter-spacing: .04em;
            text-transform: uppercase
        }

        .mood-btn:hover {
            transform: scale(1.1);
            border-color: rgba(255, 255, 255, .2)
        }

        .mood-btn.selected {
            transform: scale(1.12);
            border-width: 2px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, .4)
        }

        .mood-note {
            width: 100%;
            background: rgba(255, 255, 255, .04);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 13px 16px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: .92rem;
            outline: none;
            resize: vertical;
            min-height: 80px;
            transition: all .25s;
            margin-bottom: 14px
        }

        .mood-note:focus {
            border-color: rgba(124, 58, 237, .4);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, .07)
        }

        .mood-note::placeholder {
            color: var(--muted)
        }

        .tag-row {
            display: flex;
            gap: 7px;
            flex-wrap: wrap;
            margin-bottom: 16px
        }

        .tag-btn {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: .75rem;
            font-weight: 600;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--subtle);
            cursor: pointer;
            transition: all .2s;
            font-family: inherit
        }

        .tag-btn.sel {
            color: #fff;
            border-color: transparent
        }

        .log-btn {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all .3s;
            background: linear-gradient(135deg, #f43f5e, #e11d48)
        }

        .log-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 22px rgba(244, 63, 94, .45)
        }

        .log-btn:disabled {
            opacity: .35;
            pointer-events: none
        }

        /* CHART */
        .chart-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 24px;
            margin-bottom: 20px
        }

        .chart-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: .95rem;
            font-weight: 700;
            color: var(--subtle);
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            justify-content: space-between
        }

        .week-chart {
            display: flex;
            gap: 8px;
            align-items: flex-end;
            height: 100px;
            margin-bottom: 10px
        }

        .day-bar-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px
        }

        .day-bar {
            width: 100%;
            border-radius: 8px 8px 4px 4px;
            min-height: 4px;
            transition: height .6s cubic-bezier(.16, 1, .3, 1)
        }

        .day-lbl {
            font-size: .62rem;
            font-weight: 700;
            color: var(--muted);
            text-align: center
        }

        .day-emoji {
            font-size: .9rem;
            text-align: center
        }

        /* HISTORY */
        .history-wrap {
            display: flex;
            flex-direction: column;
            gap: 10px
        }

        .hist-item {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px 18px;
            animation: fIn .3s ease-out
        }

        .hist-mood {
            font-size: 1.8rem;
            flex-shrink: 0;
            margin-top: 2px
        }

        .hist-body {
            flex: 1;
            min-width: 0
        }

        .hist-top {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px
        }

        .hist-mood-name {
            font-weight: 700;
            font-size: .9rem
        }

        .hist-date {
            font-size: .72rem;
            color: var(--muted)
        }

        .hist-note {
            font-size: .84rem;
            color: var(--subtle);
            line-height: 1.5;
            margin-bottom: 6px
        }

        .hist-tags {
            display: flex;
            gap: 5px;
            flex-wrap: wrap
        }

        .hist-tag {
            padding: 3px 9px;
            border-radius: 8px;
            font-size: .65rem;
            font-weight: 700;
            background: rgba(255, 255, 255, .05);
            border: 1px solid var(--border);
            color: var(--muted)
        }

        .del-btn {
            width: 24px;
            height: 24px;
            border-radius: 7px;
            border: none;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            font-size: .8rem;
            transition: all .2s;
            flex-shrink: 0
        }

        .del-btn:hover {
            color: var(--rose)
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: var(--muted);
            font-size: .9rem
        }

        @media(max-width:600px) {
            nav {
                padding: 0 16px
            }

            .nav-tabs {
                display: none
            }
        }
    </style>
    <script type="module">import { checkAuth, logout } from "./auth.js"; checkAuth(); window.handleLogout = logout;</script>
</head>

<body>
    <div id="orb-bg">
        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
    </div>
    <nav>
        <a href="index.html" class="nav-logo">Taso<span>.</span></a>
        <div class="nav-tabs">
            <a href="index.html" class="nav-tab">🏠 Home</a>
            <a href="tools.html" class="nav-tab act">⚡ Tools</a>
            <a href="community.html" class="nav-tab com">🔥 Community</a>
        </div>
        <a href="tools.html" class="back-link">← Tools</a>
    </nav>
    <main>
        <h1>💭 Mood Journal</h1>
        <div class="sub">Track how you feel daily, spot patterns, and build emotional awareness.</div>

        <div class="mood-card">
            <div class="card-title">How are you feeling right now?</div>
            <div class="mood-row" id="moodRow"></div>
            <textarea class="mood-note" id="moodNote" placeholder="What's on your mind? (optional)"></textarea>
            <div class="tag-row" id="tagRow"></div>
            <button class="log-btn" id="logBtn" onclick="logMood()" disabled>Log Mood</button>
        </div>

        <div class="chart-wrap">
            <div class="chart-title">📊 This Week <span id="weekAvg"
                    style="font-size:.8rem;font-weight:600;color:var(--muted)"></span></div>
            <div class="week-chart" id="weekChart"></div>
            <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap" id="weekDays"></div>
        </div>

        <div class="chart-title"
            style="margin-bottom:14px;font-family:'Space Grotesk',sans-serif;font-size:.95rem;font-weight:700;color:var(--subtle)">
            📖 Journal Entries</div>
        <div class="history-wrap" id="histWrap"></div>
    </main>
    <script>
        const MOODS = [
            { emoji: '😄', name: 'Amazing', color: '#10b981', score: 5 },
            { emoji: '🙂', name: 'Good', color: '#06b6d4', score: 4 },
            { emoji: '😐', name: 'Okay', color: '#f59e0b', score: 3 },
            { emoji: '😔', name: 'Low', color: '#f43f5e', score: 2 },
            { emoji: '😢', name: 'Rough', color: '#8b5cf6', score: 1 }
        ];
        const TAGS = ['Work', 'Study', 'Social', 'Health', 'Tired', 'Motivated', 'Anxious', 'Creative', 'Grateful', 'Stressed'];
        const KEY = 'taso-mood-v2';
        let selected = null, selTags = [];
        let entries = JSON.parse(localStorage.getItem(KEY) || '[]');

        // Mood buttons
        const mr = document.getElementById('moodRow');
        MOODS.forEach((m, i) => {
            const b = document.createElement('button'); b.className = 'mood-btn';
            b.innerHTML = `<span>${m.emoji}</span><span class="mood-lbl">${m.name}</span>`;
            b.style.borderColor = m.color + '44';
            b.onclick = () => { selected = i; document.querySelectorAll('.mood-btn').forEach(x => { x.classList.remove('selected'); x.style.background = 'transparent'; x.style.boxShadow = '' }); b.classList.add('selected'); b.style.background = m.color + '22'; b.style.boxShadow = `0 0 0 2px ${m.color}`; document.getElementById('logBtn').disabled = false; };
            mr.appendChild(b);
        });

        // Tags
        const tr = document.getElementById('tagRow');
        TAGS.forEach(t => {
            const b = document.createElement('button'); b.className = 'tag-btn'; b.textContent = t;
            b.onclick = () => { const idx = selTags.indexOf(t); if (idx >= 0) { selTags.splice(idx, 1); b.classList.remove('sel'); b.style.background = ''; b.style.borderColor = ''; } else { selTags.push(t); b.classList.add('sel'); b.style.background = 'rgba(124,58,237,.2)'; b.style.borderColor = 'rgba(124,58,237,.4)'; } };
            tr.appendChild(b);
        });

        function logMood() {
            if (selected === null) return;
            const m = MOODS[selected];
            const entry = { id: Date.now(), mood: selected, note: document.getElementById('moodNote').value.trim(), tags: [...selTags], ts: new Date().toISOString() };
            entries.unshift(entry);
            localStorage.setItem(KEY, JSON.stringify(entries));
            // reset
            selected = null; selTags = [];
            document.getElementById('moodNote').value = '';
            document.querySelectorAll('.mood-btn').forEach(b => { b.classList.remove('selected'); b.style.background = 'transparent'; b.style.boxShadow = ''; });
            document.querySelectorAll('.tag-btn').forEach(b => { b.classList.remove('sel'); b.style.background = ''; b.style.borderColor = ''; });
            document.getElementById('logBtn').disabled = true;
            renderAll();
        }

        function delEntry(id) { entries = entries.filter(e => e.id !== id); localStorage.setItem(KEY, JSON.stringify(entries)); renderAll(); }

        function renderHistory() {
            const w = document.getElementById('histWrap');
            if (!entries.length) { w.innerHTML = '<div class="empty">No entries yet. Log your first mood above!</div>'; return; }
            w.innerHTML = '';
            entries.slice(0, 30).forEach(e => {
                const m = MOODS[e.mood];
                const d = new Date(e.ts);
                const ds = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }) + '  ' + d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
                const el = document.createElement('div'); el.className = 'hist-item';
                el.innerHTML = `<div class="hist-mood">${m.emoji}</div>
    <div class="hist-body">
      <div class="hist-top"><span class="hist-mood-name" style="color:${m.color}">${m.name}</span><span class="hist-date">${ds}</span></div>
      ${e.note ? `<div class="hist-note">${e.note}</div>` : ''}
      ${e.tags.length ? `<div class="hist-tags">${e.tags.map(t => `<span class="hist-tag">${t}</span>`).join('')}</div>` : ''}
    </div>
    <button class="del-btn" onclick="delEntry(${e.id})">✕</button>`;
                w.appendChild(el);
            });
        }

        function renderWeek() {
            const chart = document.getElementById('weekChart');
            const daysWrap = document.getElementById('weekDays');
            chart.innerHTML = ''; daysWrap.innerHTML = '';
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            let totalScore = 0, countDays = 0;
            for (let i = 6; i >= 0; i--) {
                const d = new Date(); d.setDate(d.getDate() - i);
                const ds = d.toISOString().slice(0, 10);
                const dayEntries = entries.filter(e => e.ts.slice(0, 10) === ds);
                const avg = dayEntries.length ? dayEntries.reduce((s, e) => s + MOODS[e.mood].score, 0) / dayEntries.length : 0;
                if (avg > 0) { totalScore += avg; countDays++; }
                const col = avg >= 4 ? '#10b981' : avg >= 3 ? '#06b6d4' : avg >= 2 ? '#f59e0b' : avg > 0 ? '#f43f5e' : 'rgba(255,255,255,.06)';
                const lastM = dayEntries.length ? MOODS[dayEntries[dayEntries.length - 1].mood] : null;
                const bw = document.createElement('div'); bw.className = 'day-bar-wrap';
                bw.innerHTML = `<div class="day-emoji">${lastM ? lastM.emoji : '·'}</div><div class="day-bar" style="height:${Math.max(4, avg * 18)}px;background:${col}"></div>`;
                chart.appendChild(bw);
                const dl = document.createElement('div'); dl.style.cssText = 'flex:1;text-align:center;font-size:.62rem;font-weight:700;color:var(--muted)';
                dl.textContent = days[d.getDay()]; daysWrap.appendChild(dl);
            }
            const overall = countDays ? totalScore / countDays : 0;
            const ovM = overall >= 4.5 ? 'Amazing' : overall >= 3.5 ? 'Good' : overall >= 2.5 ? 'Okay' : overall >= 1.5 ? 'Low' : '';
            document.getElementById('weekAvg').textContent = ovM ? 'Avg: ' + ovM : '';
        }

        function renderAll() { renderHistory(); renderWeek(); }
        renderAll();
    </script>
</body>

</html>
