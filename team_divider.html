<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Team Divider</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-dark: #7c3aed;
            --accent: #f43f5e;
            --bg: #05070f;
            --surface: rgba(255, 255, 255, 0.04);
            --surface2: rgba(255, 255, 255, 0.08);
            --text: #f1f5f9;
            --text-muted: #64748b;
            --border: rgba(255, 255, 255, 0.1);
            --danger: #ef4444;
            --success: #22c55e;
            --radius: 20px;
        }

        body[data-theme="light"] {
            --bg: #f8fafc;
            --surface: #ffffff;
            --surface2: #f1f5f9;
            --text: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background-color 0.4s, color 0.4s;
        }

        /* Iframe / Compact Mode */
        body.in-iframe {
            padding: 0;
            min-height: 100vh;
            overflow: hidden;
            background: transparent;
        }

        body.in-iframe .back-link {
            display: none !important;
        }

        body.in-iframe .app-container {
            max-width: 100%;
            width: 100%;
            height: 100vh;
            min-height: 0;
            border-radius: 0;
            box-shadow: none;
            border: none;
            background: var(--bg);
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 1000;
            background: var(--surface);
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid var(--border);
        }

        .app-container {
            width: 100%;
            max-width: 1000px;
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 600px;
            position: relative;
        }

        .header-tabs {
            display: flex;
            padding: 6px;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-muted);
            border-radius: 14px;
            transition: all 0.2s;
            font-size: 14px;
        }

        .tab.active {
            background: var(--primary);
            color: white;
        }

        .app-main {
            flex: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
        }

        .view {
            display: none;
            flex-direction: column;
            animation: viewFade 0.4s ease;
            height: 100%;
        }

        .view.active {
            display: flex;
        }

        @keyframes viewFade {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Setup View Split */
        .setup-grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 30px;
            height: 100%;
        }

        @media (max-width: 768px) {
            .setup-grid {
                grid-template-columns: 1fr;
            }
        }

        .panel-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        .input-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .st-input {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            color: var(--text);
            font-family: inherit;
        }

        .btn-add {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0 15px;
            font-weight: 700;
            cursor: pointer;
        }

        .list-cont {
            flex: 1;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.1);
            padding: 5px;
            max-height: 400px;
        }

        .item-chip {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: var(--surface2);
            border-radius: 11px;
            margin-bottom: 4px;
            border: 1px solid transparent;
        }

        .del-item {
            background: transparent;
            border: none;
            color: var(--rose);
            cursor: pointer;
            opacity: 0.5;
        }

        .settings-panel {
            padding: 20px;
            background: var(--surface2);
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .set-row {
            margin-bottom: 20px;
        }

        .set-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .range-wrap {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        input[type=range] {
            flex: 1;
            accent-color: var(--primary);
        }

        .range-val {
            font-size: 18px;
            font-weight: 800;
            color: var(--primary-light);
            min-width: 25px;
        }

        .mode-toggle {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            background: rgba(0, 0, 0, 0.2);
            padding: 4px;
            border-radius: 12px;
        }

        .mode-btn {
            padding: 10px;
            border-radius: 10px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }

        .mode-btn.active {
            background: var(--surface);
            color: var(--text);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .member.dragging {
            opacity: 0.5;
            transform: scale(0.95);
        }

        .team-card.drag-over {
            border-color: var(--primary);
            background: rgba(124, 58, 237, 0.05);
            transform: scale(1.02);
        }

        .pool-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .pool-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            min-height: 50px;
        }

        .pool-chip {
            padding: 8px 16px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: grab;
            transition: all 0.2s;
        }

        .pool-chip:active {
            cursor: grabbing;
        }

        .pool-chip:hover {
            border-color: var(--primary-light);
            background: var(--surface3);
        }

        .gen-btn-container {
            display: flex;
            justify-content: center;
            padding: 40px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
        }

        /* Teams View */
        .teams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            overflow-y: auto;
            padding-bottom: 20px;
        }

        .team-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 15px;
            animation: cardZip 0.4s ease forwards;
        }

        @keyframes cardZip {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
        }

        .team-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            margin-bottom: 12px;
        }

        .team-name {
            font-weight: 800;
            font-size: 16px;
            color: var(--primary-light);
        }

        .team-count {
            font-size: 11px;
            background: var(--surface2);
            padding: 2px 8px;
            border-radius: 20px;
        }

        .member-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .member {
            padding: 10px;
            background: var(--surface2);
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
        }

        /* Decoy Wheel */
        .decoy-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .decoy-overlay.active {
            display: flex;
        }

        .decoy-wheel {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            border: 8px solid white;
            position: relative;
            margin-bottom: 30px;
        }

        .decoy-status {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: white;
        }

        body.in-iframe .back-link {
            display: none !important;
        }
    </style>
</head>

<body>
    <a href="index.html" class="back-link">← Back to Taso</a>

    <div class="app-container">
        <div class="header-tabs">
            <div class="tab active" data-tab="setup" onclick="switchView('setup')">Setup Groups</div>
            <div class="tab" data-tab="teams" onclick="switchView('teams')">Generated Teams</div>
        </div>

        <div class="app-main">
            <!-- SETUP -->
            <div class="view active" id="view-setup">
                <div class="setup-grid">
                    <div style="display:flex; flex-direction:column;">
                        <div class="panel-title">Names list</div>
                        <div class="input-box">
                            <input type="text" id="nameIn" class="st-input" placeholder="Add name..."
                                onkeypress="if(event.key==='Enter')addName()">
                            <button class="btn-add" onclick="addName()">Add</button>
                        </div>
                        <div class="list-cont" id="nameCont"></div>
                        <div style="margin-top:10px; text-align:right;">
                            <button onclick="if(confirm('Clear names?')){names=[];renderNames();}"
                                style="background:transparent;border:none;color:var(--rose);cursor:pointer;font-size:11px;font-weight:700;">CLEAR
                                NAMES</button>
                        </div>
                    </div>

                    <div class="settings-panel">
                        <div class="panel-title">Settings</div>
                        <div class="set-row">
                            <span class="set-label">Team Count</span>
                            <div class="range-wrap">
                                <input type="range" id="teamRange" min="2" max="10" value="2"
                                    oninput="document.getElementById('teamVal').textContent=this.value">
                                <span class="range-val" id="teamVal">2</span>
                            </div>
                        </div>
                        <div class="set-row">
                            <span class="set-label">Logic Mode</span>
                            <div class="mode-toggle">
                                <button class="mode-btn active" id="btnRand" onclick="setMode('random')">Random</button>
                                <button class="mode-btn" id="btnPrec" onclick="setMode('precise')">Pre-defined</button>
                            </div>
                            <div style="font-size:11px; color:var(--text-muted); margin-top:8px;" id="modeHint">True
                                mathematical randomness.</div>
                        </div>
                        <button class="divide-btn-setup" onclick="switchView('teams')"
                            style="width:100%; margin-top:20px; padding:16px; border-radius:16px; border:none; background:var(--surface3); color:white; font-size:15px; font-weight:700; cursor:pointer;">
                            GO TO TEAMS VIEW →
                        </button>
                    </div>
                </div>
            </div>

            <!-- TEAMS -->
            <div class="view" id="view-teams">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <div class="panel-title" style="margin:0;">Manage Teams</div>
                    <div style="display:flex; gap:10px;">
                        <button class="m-btn m-btn-sec" onclick="resetTeams()" id="btnResetTeams">Reset All</button>
                        <button class="m-btn m-btn-sec" onclick="switchView('setup')">Back to Setup</button>
                    </div>
                </div>

                <!-- Pool Section (for Pre-defined) -->
                <div id="poolSection" class="pool-section" style="display:none;">
                    <div class="panel-title" style="font-size:10px; margin-bottom:10px;">Members Pool (Drag to teams)
                    </div>
                    <div class="pool-grid" id="poolGrid" ondrop="dropToPool(event)" ondragover="allowDrop(event)"></div>
                </div>

                <!-- Random Gen Plate -->
                <div id="randomGenPlate" class="gen-btn-container" style="display:none;">
                    <div style="text-align:center;">
                        <div style="font-size:40px; margin-bottom:15px;">🎲</div>
                        <button class="divide-btn" onclick="startDividing()"
                            style="padding:15px 40px; border-radius:15px; border:none; background:var(--primary); color:white; font-weight:800; font-size:18px; cursor:pointer; font-family:'Space Grotesk';">GENERATE
                            RANDOM TEAMS</button>
                    </div>
                </div>

                <div class="teams-grid" id="teamsCont"></div>
            </div>
        </div>

        <div class="decoy-overlay" id="decoy">
            <div class="decoy-wheel" id="decoyWheel"></div>
            <div class="decoy-status">ALLOCATING TEAMS...</div>
        </div>
    </div>

    <script>
        let names = [];
        let mode = 'random';
        // Theme Sync
        window.addEventListener('message', e => { if (e.data.type === 'taso-theme') document.body.setAttribute('data-theme', e.data.theme); });
        const savedTheme = localStorage.getItem('taso-theme');
        if (savedTheme) document.body.setAttribute('data-theme', savedTheme);
        if (window.self !== window.top) document.body.classList.add('in-iframe');

        function addName() {
            const inp = document.getElementById('nameIn');
            const val = inp.value.trim();
            if (!val) return;
            names.push({ id: Date.now(), name: val });
            inp.value = ''; inp.focus();
            renderNames();
        }

        function renderNames() {
            const cont = document.getElementById('nameCont');
            if (names.length === 0) { cont.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);font-size:14px;">Add some names to divide into teams!</div>'; return; }
            cont.innerHTML = names.map(n => `
                <div class="item-chip">
                    <span>${n.name}</span>
                    <button class="del-item" onclick="names=names.filter(x=>x.id!==${n.id});renderNames()">✕</button>
                </div>
            `).join('');
        }

        function setMode(m) {
            mode = m;
            document.getElementById('btnRand').classList.toggle('active', m === 'random');
            document.getElementById('btnPrec').classList.toggle('active', m === 'precise');
            document.getElementById('modeHint').textContent = m === 'random' ? 'True mathematical randomness.' : 'Manually assign members by dragging.';
        }

        let assignedTeams = []; // { name: '', members: [] }

        function switchView(v) {
            document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.dataset.tab === v));
            document.querySelectorAll('.view').forEach(el => el.classList.toggle('active', el.id === `view-${v}`));

            if (v === 'teams') {
                prepareTeamsView();
            }
        }

        function prepareTeamsView() {
            const teamCount = parseInt(document.getElementById('teamRange').value);
            const poolSection = document.getElementById('poolSection');
            const genPlate = document.getElementById('randomGenPlate');
            const cont = document.getElementById('teamsCont');

            // Initialize teams if count changed or empty
            if (assignedTeams.length !== teamCount) {
                assignedTeams = Array.from({ length: teamCount }, (_, i) => ({ id: i, members: [] }));
            }

            if (mode === 'random') {
                poolSection.style.display = 'none';
                genPlate.style.display = 'flex';
                cont.innerHTML = '';
            } else {
                poolSection.style.display = 'block';
                genPlate.style.display = 'none';
                renderPredefined();
            }
        }

        function renderPredefined() {
            const poolGrid = document.getElementById('poolGrid');
            const assignedNames = assignedTeams.flatMap(t => t.members);
            const available = names.filter(n => !assignedNames.includes(n.name));

            poolGrid.innerHTML = available.map(n => `
                <div class="pool-chip" draggable="true" ondragstart="drag(event)" id="node-${n.id}" data-name="${n.name}">${n.name}</div>
            `).join('');

            const cont = document.getElementById('teamsCont');
            cont.innerHTML = assignedTeams.map((team, i) => `
                <div class="team-card" ondrop="dropToTeam(event, ${i})" ondragover="allowDrop(event)">
                    <div class="team-header">
                        <span class="team-name">Team ${i + 1}</span>
                        <span class="team-count">${team.members.length}</span>
                    </div>
                    <div class="member-list">
                        ${team.members.map(m => `
                            <div class="member" draggable="true" ondragstart="drag(event)" id="mem-${m.replace(/\s+/g, '-')}" data-name="${m}" data-from-team="${i}">${m}</div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function resetTeams() {
            assignedTeams.forEach(t => t.members = []);
            renderPredefined();
        }

        // Drag & Drop
        function allowDrop(ev) { ev.preventDefault(); ev.currentTarget.classList.add('drag-over'); }
        window.addEventListener('dragleave', (e) => { if (e.target.classList) e.target.classList.remove('drag-over'); });

        function drag(ev) {
            ev.dataTransfer.setData("name", ev.target.dataset.name);
            ev.dataTransfer.setData("fromTeam", ev.target.dataset.fromTeam || "");
        }

        function dropToTeam(ev, teamIdx) {
            ev.preventDefault();
            ev.currentTarget.classList.remove('drag-over');
            const name = ev.dataTransfer.getData("name");
            const fromTeam = ev.dataTransfer.getData("fromTeam");

            if (fromTeam !== "") {
                const fIdx = parseInt(fromTeam);
                assignedTeams[fIdx].members = assignedTeams[fIdx].members.filter(m => m !== name);
            }

            if (!assignedTeams[teamIdx].members.includes(name)) {
                assignedTeams[teamIdx].members.push(name);
            }
            renderPredefined();
        }

        function dropToPool(ev) {
            ev.preventDefault();
            ev.currentTarget.classList.remove('drag-over');
            const name = ev.dataTransfer.getData("name");
            const fromTeam = ev.dataTransfer.getData("fromTeam");

            if (fromTeam !== "") {
                const fIdx = parseInt(fromTeam);
                assignedTeams[fIdx].members = assignedTeams[fIdx].members.filter(m => m !== name);
            }
            renderPredefined();
        }

        function startDividing() {
            if (names.length < 2) { alert('Add at least 2 names!'); return; }
            const overlay = document.getElementById('decoy');
            overlay.classList.add('active');

            let rot = 0;
            const start = performance.now();
            function animateDecoy(now) {
                const elapsed = now - start;
                rot += (Math.max(5, 40 * (1 - elapsed / 3000)));
                document.getElementById('decoyWheel').style.transform = `rotate(${rot}deg)`;
                if (elapsed < 3000) requestAnimationFrame(animateDecoy);
                else finishDividing();
            }
            requestAnimationFrame(animateDecoy);
        }

        function finishDividing() {
            document.getElementById('decoy').classList.remove('active');
            document.getElementById('randomGenPlate').style.display = 'none';
            const teamCount = parseInt(document.getElementById('teamRange').value);
            const shuffled = [...names].sort(() => Math.random() - 0.5);
            const teams = Array.from({ length: teamCount }, () => []);

            shuffled.forEach((n, i) => teams[i % teamCount].push(n.name));

            const cont = document.getElementById('teamsCont');
            cont.innerHTML = teams.map((team, i) => `
                <div class="team-card">
                    <div class="team-header">
                        <span class="team-name">Team ${i + 1}</span>
                        <span class="team-count">${team.length}</span>
                    </div>
                    <div class="member-list">
                        ${team.map(m => `<div class="member">${m}</div>`).join('')}
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>

</html>
